<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uang Ajaib - Form Pengajuan</title>

<style>
:root{
    --primary:#16a34a;
    --primary-dark:#15803d;
    --bg:#f8fafc;
    --text:#0f172a;
    --muted:#64748b;
    --border:#e2e8f0;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#f0fdf4,#ecfeff);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:500px;
}

.card{
    background:#fff;
    border-radius:24px;
    padding:35px;
    box-shadow:
        0 10px 25px rgba(0,0,0,.08),
        0 2px 8px rgba(0,0,0,.05);
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo h1{
    color:var(--primary);
    font-size:34px;
    font-weight:800;
    letter-spacing:1px;
}

.logo p{
    color:var(--muted);
    margin-top:8px;
}

.preview-wrapper{
    display:flex;
    justify-content:center;
    margin-bottom:20px;
}

.preview{
    width:140px;
    height:140px;
    border-radius:20px;
    overflow:hidden;
    border:3px dashed #cbd5e1;
    background:#f8fafc;
}

.preview img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.form-group{
    margin-bottom:16px;
}

label{
    display:block;
    margin-bottom:8px;
    color:var(--text);
    font-weight:600;
}

input,
textarea{
    width:100%;
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px;
    font-size:15px;
    transition:.2s;
}

input:focus,
textarea:focus{
    outline:none;
    border-color:var(--primary);
    box-shadow:0 0 0 4px rgba(22,163,74,.12);
}

textarea{
    resize:none;
    min-height:90px;
}

input[type=file]{
    padding:10px;
}

.btn{
    width:100%;
    border:none;
    border-radius:14px;
    padding:16px;
    background:var(--primary);
    color:#fff;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    transition:.2s;
}

.btn:hover{
    background:var(--primary-dark);
}

.note{
    margin-top:15px;
    text-align:center;
    font-size:13px;
    color:var(--muted);
}
</style>
</head>
<body>

<div class="container">

    <div class="card">

        <div class="logo">
            <h1>UANG AJAIB</h1>
            <p>Silakan lengkapi data Anda</p>
        </div>

        <div class="preview-wrapper">
            <div class="preview">
                <img id="previewImage"
                     src="https://via.placeholder.com/140x140?text=Foto"
                     alt="Preview">
            </div>
        </div>

        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text"
                   id="nama"
                   placeholder="Masukkan nama lengkap">
        </div>

        <div class="form-group">
            <label>Umur</label>
            <input type="number"
                   id="umur"
                   placeholder="Masukkan umur">
        </div>

        <div class="form-group">
            <label>Alamat</label>
            <textarea id="alamat"
                      placeholder="Masukkan alamat lengkap"></textarea>
        </div>

        <div class="form-group">
            <label>Foto</label>
            <input type="file"
                   id="foto"
                   accept="image/*">
        </div>

        <button class="btn" onclick="kirimWA()">
            Kirim ke WhatsApp
        </button>

        <div class="note">
            Data akan disiapkan untuk dikirim ke WhatsApp Admin.
        </div>

    </div>

</div>

<script>

document.getElementById('foto').addEventListener('change', function(){

    const file = this.files[0];

    if(file){
        document.getElementById('previewImage').src =
            URL.createObjectURL(file);
    }

});

function kirimWA(){

    const nama = document.getElementById('nama').value.trim();
    const umur = document.getElementById('umur').value.trim();
    const alamat = document.getElementById('alamat').value.trim();

    if(!nama || !umur || !alamat){
        alert('Mohon lengkapi semua data.');
        return;
    }

    const pesan =
`Halo Admin Uang Ajaib

Nama : ${nama}
Umur : ${umur}
Alamat : ${alamat}

Saya ingin mengajukan permohonan dan telah mengisi formulir.`;

    const nomorAdmin = '6283189306589';

    window.open(
        `https://wa.me/${nomorAdmin}?text=${encodeURIComponent(pesan)}`,
        '_blank'
    );
}
</script>

</body>
</html>
