<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulir WhatsApp Admin</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:linear-gradient(135deg,#0f172a,#1e293b);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
background:#fff;
width:100%;
max-width:550px;
padding:30px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,.3);
}

h2{
text-align:center;
margin-bottom:8px;
color:#111827;
}

.subtitle{
text-align:center;
margin-bottom:20px;
color:#64748b;
font-size:14px;
}

input,textarea,select{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
outline:none;
font-size:15px;
}

input:focus,
textarea:focus,
select:focus{
border-color:#25D366;
box-shadow:0 0 0 3px rgba(37,211,102,.15);
}

textarea{
resize:vertical;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
background:#25D366;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.footer{
text-align:center;
font-size:12px;
margin-top:15px;
color:#64748b;
}
</style>

</head>
<body>

<div class="card">

<h2>Formulir Pendaftaran</h2>

<p class="subtitle">
Silakan isi data dengan lengkap
</p>

<input type="text" id="nama" placeholder="Nama Lengkap">

<input type="text" id="wa" placeholder="Nomor WhatsApp">

<input type="number" id="umur" placeholder="Umur">

<select id="kategori">
<option>Pendaftaran</option>
<option>Konsultasi</option>
<option>Informasi</option>
<option>Lainnya</option>
</select>

<textarea id="alamat" rows="4" placeholder="Alamat Lengkap"></textarea>

<textarea id="pesan" rows="5" placeholder="Keterangan atau pesan tambahan"></textarea>

<button onclick="kirimWA()">
📲 Kirim ke WhatsApp Admin
</button>

<div class="footer">
Data akan otomatis dikirim ke WhatsApp Admin
</div>

</div>

<script>

function kirimWA(){

let nama = document.getElementById("nama").value;
let wa = document.getElementById("wa").value;
let umur = document.getElementById("umur").value;
let kategori = document.getElementById("kategori").value;
let alamat = document.getElementById("alamat").value;
let pesan = document.getElementById("pesan").value;

let text =
`📋 *FORMULIR PENDAFTARAN*

👤 Nama : ${nama}
📱 WhatsApp : ${wa}
🎂 Umur : ${umur}
📂 Kategori : ${kategori}

🏠 Alamat :
${alamat}

💬 Keterangan :
${pesan}`;

window.open(
`https://wa.me/6283189306589?text=${encodeURIComponent(text)}`,
'_blank'
);

}

</script>

</body>
</html>
